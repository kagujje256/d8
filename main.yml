name: D8 Online PC

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run-online-pc:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH & Tunnel
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server net-tools curl wget
          sudo systemctl enable ssh
          sudo systemctl start ssh
          echo "root:D8RunnerPass!" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart sshd
          echo "SSH configured"

      - name: Setup Tunnel (Ngrok)
        run: |
          curl -sL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y -qq ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          nohup ngrok tcp 22 --log=stdout > /tmp/ngrok.log 2>&1 &
          sleep 5
          curl -s http://127.0.0.1:4040/api/tunnels | python3 -c "
import sys, json
d = json.load(sys.stdin)
for t in d.get('tunnels', []):
    print(f\"{t['public_url']} -> {t['config']['addr']}\")
" || echo "Awaiting tunnel..."

      - name: Setup Tailscale (alternative)
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TS_AUTHKEY }} --hostname=d8-online-pc --accept-routes --accept-dns=false 2>&1 || echo "Tailscale optional"
          echo "Tailscale IP:"
          tailscale ip -4 2>/dev/null || echo "tailscale not connected"

      - name: Connection Info
        run: |
          echo "========== D8 ONLINE PC =========="
          echo "Public IP: $(curl -s ifconfig.me 2>/dev/null)"
          echo "Username: root"
          echo "Password: D8RunnerPass!"
          echo "SSH Port: 22"
          echo ""
          echo "=== Ngrok SSH ==="
          curl -s http://127.0.0.1:4040/api/tunnels 2>/dev/null | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    for t in d.get('tunnels', []):
        print(t['public_url'])
except: print('awaiting ngrok...')
" 2>/dev/null
          echo ""
          echo "=== Tailscale ==="
          tailscale ip -4 2>/dev/null || echo "tailscale not connected"
          echo "================================"

      - name: Keep Alive
        run: |
          echo "D8 Online PC is LIVE for 6 hours..."
          sleep 21000
          echo "Time expired, shutting down."

